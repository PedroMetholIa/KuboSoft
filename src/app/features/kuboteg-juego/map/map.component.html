<div class="map-wrapper" (click)="deseleccionar.emit()">

  <svg class="teg-map" viewBox="0 50 1100 550" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

    <defs>
      <radialGradient id="badge-grad" cx="38%" cy="32%" r="70%" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="#2a3f62"/>
        <stop offset="58%"  stop-color="#0e1c35"/>
        <stop offset="100%" stop-color="#060b19"/>
      </radialGradient>

      <filter id="coastal-glow" x="-12%" y="-12%" width="124%" height="124%">
        <feMorphology operator="dilate" radius="8" result="expanded"/>
        <feComposite in="expanded" in2="SourceGraphic" operator="out" result="outline"/>
        <feFlood flood-color="#4dd8ff" result="color"/>
        <feComposite in="color" in2="outline" operator="in" result="colored"/>
        <feGaussianBlur in="colored" stdDeviation="10"/>
      </filter>

      <pattern id="destruccion-pattern" patternUnits="objectBoundingBox" patternContentUnits="objectBoundingBox" width="1" height="1">
        <image href="assets/KuboTeg/destruccion.png" x="0" y="0" width="1" height="1" preserveAspectRatio="xMidYMid slice"/>
      </pattern>
    </defs>

    <image href="assets/KuboTeg/FondoOceano.webp" x="0" y="50" width="1100" height="550" preserveAspectRatio="xMidYMid slice"/>

    <g id="map-content">

      <!-- Puentes transoceánicos (debajo de territorios) -->
      <g id="bridges" pointer-events="none" stroke="rgba(255,255,255,0.35)" stroke-dasharray="5,4" stroke-width="1.5" stroke-linecap="round">
        <!-- América del Norte -->
        <line x1="232" y1="154" x2="0"    y2="154"/><!-- Alaska → borde izq    -->
        <line x1="351" y1="411" x2="0"    y2="411"/><!-- Perú  → borde izq     -->
        <line x1="302" y1="157" x2="435" y2="130"/><!-- N.W.Territory–Groenlandia-->
        <line x1="388" y1="204" x2="435" y2="130"/><!-- Quebec – Groenlandia   -->
        <line x1="493" y1="178" x2="435" y2="130"/><!-- Islandia – Groenlandia -->
        <!-- Europa -->
        <line x1="502" y1="294" x2="485" y2="233"/><!-- España – Inglaterra     -->
        <line x1="555" y1="175" x2="485" y2="233"/><!-- Suecia – Inglaterra    -->
        <line x1="493" y1="178" x2="485" y2="233"/><!-- Islandia – Inglaterra  -->
        <line x1="493" y1="178" x2="555" y2="175"/><!-- Islandia – Suecia      -->
        <line x1="580" y1="360" x2="557" y2="290"/><!-- Egipto – Italia        -->
        <!-- Cuba -->
        <line x1="370" y1="310" x2="304" y2="310"/><!-- Cuba – México          -->
        <line x1="370" y1="310" x2="355" y2="264"/><!-- Cuba – Nueva York      -->
        <line x1="370" y1="310" x2="356" y2="351"/><!-- Cuba – Venezuela       -->
        <!-- África -->
        <line x1="408" y1="405" x2="526" y2="388"/><!-- Brasil – Argelia       -->
        <line x1="582" y1="510" x2="646" y2="510"/><!-- Sudáfrica – Madagascar -->
        <line x1="618" y1="420" x2="646" y2="510"/><!-- Etiopía – Madagascar   -->
        <!-- Asia / Pacífico -->
        <line x1="721" y1="344" x2="794" y2="434"/><!-- India – Indonesia      -->
        <line x1="778" y1="359" x2="854" y2="415"/><!-- Vietnam – Nueva Guinea -->
        <line x1="785" y1="247" x2="854" y2="255"/><!-- Mongolia – Japón       -->
        <line x1="836" y1="151" x2="854" y2="255"/><!-- Kamchatka – Japón      -->
        <line x1="836" y1="151" x2="1100" y2="151"/><!-- Kamchatka → borde der -->
        <!-- Oceanía -->
        <line x1="794" y1="434" x2="818" y2="510"/><!-- Indonesia – Perth      -->
        <line x1="854" y1="415" x2="874" y2="490"/><!-- Nueva Guinea – Sydney  -->
        <line x1="874" y1="490" x2="1100" y2="490"/><!-- Sydney → borde der    -->
      </g>

      <!-- Halo costero -->
      <g id="coastal-glow-layer" pointer-events="none" filter="url(#coastal-glow)" opacity="0.5">
        @for (t of territories; track t.id) {
          <path [attr.d]="t.svgPath" fill="white" stroke="none"/>
        }
      </g>

      <!-- Territorios -->
      <g id="territories">
        @for (t of territories; track t.id) {
          <path
            [attr.d]="t.svgPath"
            [attr.fill]="getTerritoryFill(t)"
            [attr.stroke]="getTerritoryStroke(t)"
            [attr.stroke-width]="getTerritoryStrokeWidth(t)"
            stroke-linejoin="round"
            stroke-linecap="round"
            class="terr"
            [class.selected]="isSelected(t)"
            [class.highlighted]="isHighlighted(t)"
            [class.en-combate]="isCombate(t)"
            [class.en-colocacion]="isColocandose(t)"
            [class.en-quitar]="isQuitandose(t)"
            [class.en-movilizacion]="isMovilizandose(t)"
            [class.en-carta-acierta]="isCartaAcierta(t)"
            [class.bomba-colocada]="isBomba(t)"
            [class.bomba-alcance]="isBombaAlcance(t)"
            (click)="onTerritoryClick(t); $event.stopPropagation()"
            (contextmenu)="onTerritoryRightClick(t, $event); $event.stopPropagation()"
            (mouseenter)="onTerritoryHover(t, $event)"
            (mouseleave)="onTerritoryLeave()"
          />
        }
      </g>

      <!-- Textura destrucción sobre territorios bombeados -->
      <g id="destruccion-layer" pointer-events="none">
        @for (t of territories; track t.id) {
          @if (isDestruido(t)) {
            <path [attr.d]="t.svgPath" fill="url(#destruccion-pattern)" opacity="0.52" stroke="none"/>
          }
        }
      </g>

      <!-- Badges de tropas -->
      <g id="badges" pointer-events="none">
        @for (t of territories; track t.id) {
          @if (getTropas(t.id) > 0) {
            <circle
              [attr.cx]="t.labelPosition.x"
              [attr.cy]="t.labelPosition.y"
              r="12.5"
              [attr.fill]="getBadgeFill(t.id)"
              [attr.stroke]="getBadgeStroke(t.id)"
              stroke-width="1.2"
            />
            <text
              [attr.x]="t.labelPosition.x"
              [attr.y]="t.labelPosition.y + 4.5"
              text-anchor="middle"
              fill="#ffffff"
              font-size="11.5"
              font-weight="700"
              font-family="'Outfit', sans-serif"
              letter-spacing="0.5"
            >{{ getTropas(t.id) }}</text>
          }
        }
      </g>

      <!-- Animación misil nuclear -->
      <g id="misil-layer" pointer-events="none">
        @if (misilTerr) {
          <g [attr.transform]="'translate(' + misilTerr.labelPosition.x + ',' + misilTerr.labelPosition.y + ')'">
            <!-- Misil cayendo -->
            <g class="misil-cuerpo">
              <!-- Llama de escape (arriba) -->
              <ellipse cx="0" cy="-17" rx="4" ry="7" fill="#fbbf24" opacity="0.92"/>
              <ellipse cx="0" cy="-14" rx="2.5" ry="4" fill="#fb923c"/>
              <!-- Aletas (arriba) -->
              <polygon points="-5,-6 -11,-13 -5,-10" fill="#64748b"/>
              <polygon points="5,-6 11,-13 5,-10" fill="#64748b"/>
              <!-- Cuerpo -->
              <rect x="-4.5" y="-9" width="9" height="15" rx="1.5" fill="#cbd5e1"/>
              <rect x="-3" y="-7" width="3" height="8" rx="1" fill="#94a3b8"/>
              <!-- Cabeza (nariz apuntando abajo) -->
              <polygon points="0,14 5.5,4 -5.5,4" fill="#dc2626"/>
            </g>
            <!-- Explosión (retrasada, aparece al impactar) -->
            <circle class="explosion-flash"  cx="0" cy="0" r="22" fill="#fef08a"/>
            <circle class="explosion-ring-1" cx="0" cy="0" r="0"  fill="none" stroke="#fbbf24" stroke-width="4"/>
            <circle class="explosion-ring-2" cx="0" cy="0" r="0"  fill="none" stroke="#ef4444" stroke-width="2.5"/>
            <circle class="explosion-ring-3" cx="0" cy="0" r="0"  fill="none" stroke="#f97316" stroke-width="1.5"/>
          </g>
        }
      </g>

      <!-- Icono Bomba Atómica sobre el territorio -->
      <g id="bomba-icon-layer" pointer-events="none">
        @for (t of territories; track t.id) {
          @if (isBomba(t)) {
            <!-- scale 0.43 → ícono ~10px; centrado verticalmente con el badge, pegado a su derecha -->
            <g [attr.transform]="'translate(' + (t.labelPosition.x + 14) + ',' + (t.labelPosition.y - 5.2) + ') scale(0.43)'">
              <circle cx="12" cy="12" r="11.5" fill="rgba(8,4,18,0.88)" stroke="#fbbf24" stroke-width="1.5"/>
              <path fill="#fbbf24" d="M10 8.54A4 4 0 0 1 14 8.54L17.5 2.47A11 11 0 0 0 6.5 2.47Z"/>
              <path fill="#fbbf24" d="M16 12A4 4 0 0 1 14 15.46L17.5 21.53A11 11 0 0 0 23 12Z"/>
              <path fill="#fbbf24" d="M10 15.46A4 4 0 0 1 8 12L1 12A11 11 0 0 0 6.5 21.53Z"/>
              <circle cx="12" cy="12" r="2" fill="#fbbf24"/>
            </g>
          }
        }
      </g>

    </g>

  </svg>

  @if (tooltip) {
    <div
      class="tooltip"
      [style.left.px]="tooltipX"
      [style.top.px]="tooltipY"
    >
      <div class="tooltip-name">{{ tooltip.name }}</div>
      <div class="tooltip-continent">{{ continentLabel(tooltip.continent) }}</div>
      @if (getOwnerName(tooltip.id)) {
        <div class="tooltip-owner">Dueño: <strong>{{ getOwnerName(tooltip.id) }}</strong></div>
      } @else {
        <div class="tooltip-owner">Sin dueño</div>
      }
      <div class="tooltip-troops">Tropas: <strong>{{ getTropas(tooltip.id) }}</strong></div>
    </div>
  }

  @if (activePactoMsg) {
    <div class="pacto-popup">
      <div class="pacto-popup-icon">🛡</div>
      <div class="pacto-popup-msg">{{ activePactoMsg }}</div>
    </div>
  }

</div>
