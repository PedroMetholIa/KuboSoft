<div class="map-wrapper" (click)="deseleccionar.emit()">

  <svg class="teg-map" viewBox="0 50 1100 550" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

    <defs>
      <filter id="filter-na" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
        <feComposite in="blend" in2="SourceGraphic" operator="in"/>
      </filter>
      <filter id="filter-sa" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
        <feComposite in="blend" in2="SourceGraphic" operator="in"/>
      </filter>
      <filter id="filter-eu" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.80" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
        <feComposite in="blend" in2="SourceGraphic" operator="in"/>
      </filter>
      <filter id="filter-af" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.70" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
        <feComposite in="blend" in2="SourceGraphic" operator="in"/>
      </filter>
      <filter id="filter-as" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.60" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
        <feComposite in="blend" in2="SourceGraphic" operator="in"/>
      </filter>
      <filter id="filter-oc" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
        <feComposite in="blend" in2="SourceGraphic" operator="in"/>
      </filter>
      <!-- Textura de territorios -->
      <pattern id="tex-pattern" patternUnits="userSpaceOnUse" x="0" y="0" width="1100" height="650">
        <image href="assets/KuboTeg/textura.png" x="0" y="0" width="1100" height="650" preserveAspectRatio="xMidYMid slice"/>
      </pattern>
      <!-- Sombra exterior de territorios para contraste con el fondo -->
      <filter id="terr-shadow" x="-12%" y="-12%" width="124%" height="124%">
        <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#67e8f9" flood-opacity="0.5"/>
      </filter>
      <!-- Glow violeta potente para China -->
      <filter id="terr-shadow-china" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#7E22CE" flood-opacity="0.9"/>
        <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#D8B4FE" flood-opacity="0.5"/>
      </filter>
      <!-- Glow amarillo potente para Asia -->
      <filter id="terr-shadow-asia" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#A16207" flood-opacity="0.9"/>
        <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#FDE047" flood-opacity="0.5"/>
      </filter>
      <!-- Glow verde potente para Europa -->
      <filter id="terr-shadow-europe" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#15803D" flood-opacity="0.9"/>
        <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#4ADE80" flood-opacity="0.5"/>
      </filter>
      <!-- Badge: gradiente de relleno oscuro azulado -->
      <radialGradient id="badge-grad" cx="38%" cy="32%" r="70%" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="#2a3f62"/>
        <stop offset="58%"  stop-color="#0e1c35"/>
        <stop offset="100%" stop-color="#060b19"/>
      </radialGradient>
      <!-- Badge: borde con gradiente (efecto 3D, iluminado arriba) -->
      <linearGradient id="badge-rim" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="rgba(165,205,255,0.85)"/>
        <stop offset="38%"  stop-color="rgba(80,135,230,0.38)"/>
        <stop offset="100%" stop-color="rgba(8,18,48,0.78)"/>
      </linearGradient>
      <!-- Badge: sombra exterior con profundidad -->
      <filter id="badge-shadow" x="-75%" y="-75%" width="250%" height="250%">
        <feDropShadow dx="0" dy="2"  stdDeviation="3.5" flood-color="rgba(0,0,0,0.82)"/>
        <feDropShadow dx="0" dy="0"  stdDeviation="7"   flood-color="rgba(0,0,0,0.28)"/>
      </filter>
      <!-- Malla de fondo más sutil -->
      <pattern id="bg-mesh" patternUnits="userSpaceOnUse" x="0" y="0" width="32" height="32">
        <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(18,55,155,0.13)" stroke-width="0.38"/>
      </pattern>
      <!-- Degradado circular (vignette azul marino) -->
      <radialGradient id="bg-vignette" cx="50%" cy="50%" r="65%" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="#020b2a" stop-opacity="0.0"/>
        <stop offset="60%"  stop-color="#03124a" stop-opacity="0.30"/>
        <stop offset="100%" stop-color="#010820" stop-opacity="0.72"/>
      </radialGradient>
    </defs>

    <!-- Fondo: imagen del mapa -->
    <image href="assets/KuboTeg/FondoOceano.png" x="0" y="50" width="1100" height="550" preserveAspectRatio="xMidYMid slice"/>
    <!-- Malla azul marina -->
    <rect x="0" y="50" width="1100" height="550" fill="url(#bg-mesh)" pointer-events="none"/>
    <!-- Vignette azul marino con degradado circular -->
    <rect x="0" y="50" width="1100" height="550" fill="url(#bg-vignette)" pointer-events="none"/>

    <!-- ── Contenedor zoomeable ───────────────────────────────────────────── -->
    <g id="map-content">

      <!-- ── Capa 1: fills + glow (sin stroke) ───────────────────────────── -->
      <g id="territories">
        <!-- 1a. Fills con glow de color — sin stroke para que el glow quede debajo de los bordes -->
        <path
          *ngFor="let t of territories"
          [attr.d]="t.svgPath"
          [attr.fill]="getTerritoryFill(t)"
          stroke="none"
          [style.filter]="getTerritoryFilter(t)"
          class="terr"
          [class.selected]="isSelected(t)"
          [class.highlighted]="isHighlighted(t)"
          (click)="onTerritoryClick(t); $event.stopPropagation()"
          (contextmenu)="onTerritoryRightClick(t, $event); $event.stopPropagation()"
          (mouseenter)="onTerritoryHover(t, $event)"
          (mouseleave)="onTerritoryLeave()"
        />
        <!-- 1b. Textura sobre el color base -->
        <path
          *ngFor="let t of territories"
          [attr.d]="t.svgPath"
          fill="url(#tex-pattern)"
          opacity="0.55"
          pointer-events="none"
          style="mix-blend-mode: multiply;"
        />
        <!-- 1c. Blanqueo: neutraliza la textura en territorios muy claros -->
        <path
          *ngFor="let t of territories"
          [attr.d]="t.svgPath"
          [attr.fill]="getWhiteOverlay(t)"
          pointer-events="none"
        />
        <!-- 1d. Halo luminescente: stroke difuminado encima de los fills -->
        <path
          *ngFor="let t of territories"
          [attr.d]="t.svgPath"
          fill="none"
          [attr.stroke]="getHaloColor(t)"
          stroke-width="9"
          stroke-linejoin="round"
          [attr.opacity]="getHaloOpacity(t)"
          style="filter: blur(11px);"
          pointer-events="none"
        />
        <!-- 1e. Strokes encima del halo — líneas de límite siempre limpias -->
        <path
          *ngFor="let t of territories"
          [attr.d]="t.svgPath"
          fill="none"
          [style.stroke]="getTerritoryStroke(t)"
          [style.stroke-width]="getTerritoryStrokeWidth(t)"
          pointer-events="none"
        />
      </g>

      <!-- ── Capa 2: badges de tropas — siempre al frente ──────────────────── -->
      <g id="badges" pointer-events="none">
        <ng-container *ngFor="let t of territories">
          <ng-container *ngIf="getTropas(t.id) > 0">
            <!-- Cuerpo: tono oscuro del color del territorio -->
            <circle
              [attr.cx]="t.labelPosition.x"
              [attr.cy]="t.labelPosition.y"
              r="12.5"
              [attr.fill]="getBadgeFill(t.id)"
              [attr.stroke]="getBadgeStroke(t.id)"
              stroke-width="1.2"
              filter="url(#badge-shadow)"
            />
            <!-- Brillo superior con tono del color -->
            <ellipse
              [attr.cx]="t.labelPosition.x"
              [attr.cy]="t.labelPosition.y - 4.5"
              rx="5.8"
              ry="3.4"
              [attr.fill]="getBadgeHighlight(t.id)"
            />
            <!-- Número de tropas -->
            <text
              [attr.x]="t.labelPosition.x"
              [attr.y]="t.labelPosition.y + 4.5"
              text-anchor="middle"
              fill="#ffffff"
              font-size="11.5"
              font-weight="700"
              font-family="'Outfit', sans-serif"
              letter-spacing="0.5"
            >{{ getTropas(t.id) }}</text>
          </ng-container>
        </ng-container>
      </g>

    </g>

  </svg>

  <!-- ── Tooltip HTML ───────────────────────────────────────────────────── -->
  <div
    class="tooltip"
    *ngIf="tooltip"
    [style.left.px]="tooltipX"
    [style.top.px]="tooltipY"
  >
    <div class="tooltip-name">{{ tooltip.name }}</div>
    <div class="tooltip-continent">{{ continentLabel(tooltip.continent) }}</div>
    <div class="tooltip-owner" *ngIf="getOwnerName(tooltip.id)">Dueño: <strong>{{ getOwnerName(tooltip.id) }}</strong></div>
    <div class="tooltip-owner" *ngIf="!getOwnerName(tooltip.id)">Sin dueño</div>
    <div class="tooltip-troops">Tropas: <strong>{{ getTropas(tooltip.id) }}</strong></div>
  </div>


</div>
