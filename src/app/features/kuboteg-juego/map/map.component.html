<div class="map-wrapper" (click)="deseleccionar.emit()">

  <svg class="teg-map" viewBox="0 50 1100 550" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

    <defs>
      <radialGradient id="badge-grad" cx="38%" cy="32%" r="70%" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="#2a3f62"/>
        <stop offset="58%"  stop-color="#0e1c35"/>
        <stop offset="100%" stop-color="#060b19"/>
      </radialGradient>

      <!-- Expande la silueta continental, extrae solo el borde exterior, colorea cyan y difumina -->
      <filter id="coastal-glow" x="-12%" y="-12%" width="124%" height="124%">
        <feMorphology operator="dilate" radius="8" result="expanded"/>
        <feComposite in="expanded" in2="SourceGraphic" operator="out" result="outline"/>
        <feFlood flood-color="#4dd8ff" result="color"/>
        <feComposite in="color" in2="outline" operator="in" result="colored"/>
        <feGaussianBlur in="colored" stdDeviation="10"/>
      </filter>
    </defs>

    <image href="assets/KuboTeg/FondoOceano.png" x="0" y="50" width="1100" height="550" preserveAspectRatio="xMidYMid slice"/>

    <g id="map-content">

      <!-- Halo costero: silueta continental unificada con glow cyan -->
      <g id="coastal-glow-layer" pointer-events="none" filter="url(#coastal-glow)" opacity="0.5">
        <path *ngFor="let t of territories" [attr.d]="t.svgPath" fill="white" stroke="none"/>
      </g>

      <!-- Territorios: fill + stroke en un solo pase -->
      <g id="territories">
        <path
          *ngFor="let t of territories"
          [attr.d]="t.svgPath"
          [attr.fill]="getTerritoryFill(t)"
          [attr.stroke]="getTerritoryStroke(t)"
          [attr.stroke-width]="getTerritoryStrokeWidth(t)"
          stroke-linejoin="round"
          stroke-linecap="round"
          class="terr"
          [class.selected]="isSelected(t)"
          [class.highlighted]="isHighlighted(t)"
          (click)="onTerritoryClick(t); $event.stopPropagation()"
          (contextmenu)="onTerritoryRightClick(t, $event); $event.stopPropagation()"
          (mouseenter)="onTerritoryHover(t, $event)"
          (mouseleave)="onTerritoryLeave()"
        />
      </g>

      <!-- Badges de tropas -->
      <g id="badges" pointer-events="none">
        <ng-container *ngFor="let t of territories">
          <ng-container *ngIf="getTropas(t.id) > 0">
            <circle
              [attr.cx]="t.labelPosition.x"
              [attr.cy]="t.labelPosition.y"
              r="12.5"
              [attr.fill]="getBadgeFill(t.id)"
              [attr.stroke]="getBadgeStroke(t.id)"
              stroke-width="1.2"
            />
            <text
              [attr.x]="t.labelPosition.x"
              [attr.y]="t.labelPosition.y + 4.5"
              text-anchor="middle"
              fill="#ffffff"
              font-size="11.5"
              font-weight="700"
              font-family="'Outfit', sans-serif"
              letter-spacing="0.5"
            >{{ getTropas(t.id) }}</text>
          </ng-container>
        </ng-container>
      </g>

    </g>

  </svg>

  <div
    class="tooltip"
    *ngIf="tooltip"
    [style.left.px]="tooltipX"
    [style.top.px]="tooltipY"
  >
    <div class="tooltip-name">{{ tooltip.name }}</div>
    <div class="tooltip-continent">{{ continentLabel(tooltip.continent) }}</div>
    <div class="tooltip-owner" *ngIf="getOwnerName(tooltip.id)">Dueño: <strong>{{ getOwnerName(tooltip.id) }}</strong></div>
    <div class="tooltip-owner" *ngIf="!getOwnerName(tooltip.id)">Sin dueño</div>
    <div class="tooltip-troops">Tropas: <strong>{{ getTropas(tooltip.id) }}</strong></div>
  </div>

</div>
