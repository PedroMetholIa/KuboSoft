<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#ffffff"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97BA0"/>
      <stop offset="100%" stop-color="#C855FC"/>
    </linearGradient>
  </defs>
  <!-- Calendario con día destacado -->
  <g transform="translate(24,18)">
    <!-- cuerpo -->
    <rect x="4" y="18" width="144" height="148" rx="16"
      fill="rgba(249,123,160,0.07)" stroke="url(#g)" stroke-width="5.5"/>
    <!-- banda superior -->
    <rect x="4" y="18" width="144" height="36" rx="16" fill="url(#g)"/>
    <rect x="4" y="36" width="144" height="18" rx="0" fill="url(#g)"/>
    <!-- anillas -->
    <line x1="48"  y1="4" x2="48"  y2="30" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>
    <line x1="104" y1="4" x2="104" y2="30" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>
    <!-- puntos días -->
    <circle cx="36"  cy="82"  r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="62"  cy="82"  r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="88"  cy="82"  r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="114" cy="82"  r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="140" cy="82"  r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="36"  cy="110" r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="62"  cy="110" r="7" fill="url(#g)" opacity="0.3"/>
    <!-- día destacado -->
    <circle cx="88"  cy="110" r="20" fill="url(#g)"/>
    <circle cx="114" cy="110" r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="140" cy="110" r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="36"  cy="138" r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="62"  cy="138" r="7" fill="url(#g)" opacity="0.3"/>
    <circle cx="88"  cy="138" r="7" fill="url(#g)" opacity="0.3"/>
  </g>
</svg>
