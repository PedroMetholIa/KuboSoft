<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#ffffff"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B93FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <!-- Barras de gráfico con nodo IA -->
  <g transform="translate(16,16)">
    <rect x="4"   y="108" width="30" height="60" rx="6" fill="url(#g)"/>
    <rect x="44"  y="72"  width="30" height="96" rx="6" fill="url(#g)" opacity="0.8"/>
    <rect x="84"  y="36"  width="30" height="132" rx="6" fill="url(#g)" opacity="0.9"/>
    <rect x="124" y="84"  width="30" height="84" rx="6" fill="url(#g)" opacity="0.7"/>
    <!-- nodo IA -->
    <circle cx="139" cy="36" r="22" fill="none" stroke="url(#g)" stroke-width="4.5"/>
    <circle cx="139" cy="36" r="8"  fill="url(#g)"/>
    <!-- línea conectora -->
    <line x1="139" y1="58" x2="139" y2="84" stroke="url(#g)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
