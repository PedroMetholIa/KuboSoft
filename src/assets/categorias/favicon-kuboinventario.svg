<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#ffffff"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBB830"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <!-- Caja 3D con grilla de stock -->
  <g transform="translate(14,14)">
    <!-- lateral derecho -->
    <path d="M118 52 L154 24 L154 130 L118 158"
      fill="rgba(249,115,22,0.10)" stroke="url(#g)" stroke-width="4.5" stroke-linejoin="round"/>
    <!-- tapa -->
    <path d="M18 52 L54 24 L154 24 L118 52"
      fill="rgba(251,184,48,0.14)" stroke="url(#g)" stroke-width="4.5" stroke-linejoin="round"/>
    <!-- frente -->
    <rect x="18" y="52" width="100" height="106" rx="6"
      fill="rgba(251,184,48,0.06)" stroke="url(#g)" stroke-width="5"/>
    <!-- grilla 3x3 en el frente -->
    <rect x="30"  y="66"  width="22" height="22" rx="4" fill="url(#g)" opacity="0.95"/>
    <rect x="58"  y="66"  width="22" height="22" rx="4" fill="url(#g)" opacity="0.95"/>
    <rect x="86"  y="66"  width="22" height="22" rx="4" fill="url(#g)" opacity="0.40"/>
    <rect x="30"  y="94"  width="22" height="22" rx="4" fill="url(#g)" opacity="0.95"/>
    <rect x="58"  y="94"  width="22" height="22" rx="4" fill="url(#g)" opacity="0.40"/>
    <rect x="86"  y="94"  width="22" height="22" rx="4" fill="url(#g)" opacity="0.14"/>
    <rect x="30"  y="122" width="22" height="22" rx="4" fill="url(#g)" opacity="0.40"/>
    <rect x="58"  y="122" width="22" height="22" rx="4" fill="url(#g)" opacity="0.14"/>
    <rect x="86"  y="122" width="22" height="22" rx="4" stroke="url(#g)" stroke-width="3" fill="none" opacity="0.35"/>
  </g>
</svg>
